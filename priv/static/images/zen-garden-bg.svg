<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions for natural color transitions -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(94% 0.015 110);stop-opacity:1" />
      <stop offset="30%" style="stop-color:oklch(92% 0.018 105);stop-opacity:1" />
      <stop offset="70%" style="stop-color:oklch(88% 0.025 100);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(85% 0.032 95);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="stoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(75% 0.008 85);stop-opacity:1" />
      <stop offset="50%" style="stop-color:oklch(72% 0.012 80);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(68% 0.015 75);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(35% 0.08 135);stop-opacity:1" />
      <stop offset="50%" style="stop-color:oklch(32% 0.085 130);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(28% 0.09 125);stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(45% 0.05 65);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(35% 0.08 55);stop-opacity:1" />
    </linearGradient>
    
    <!-- Filters for texture and depth -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="textureNoise">
      <feTurbulence baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" opacity="0.03"/>
    </filter>
  </defs>
  
  <!-- Sky and distant mountains -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>
  
  <!-- Distant mountain silhouettes -->
  <path d="M0 350 Q200 320 400 340 Q600 310 800 325 Q1000 300 1200 320 Q1400 295 1600 315 Q1700 305 1920 325 L1920 1080 L0 1080 Z" 
        fill="oklch(82% 0.015 120)" opacity="0.6"/>
  
  <!-- Temple/shrine frame elements -->
  <!-- Left pillar -->
  <rect x="0" y="200" width="120" height="880" fill="url(#woodGradient)" filter="url(#softShadow)"/>
  <rect x="10" y="210" width="100" height="20" fill="oklch(40% 0.06 60)" opacity="0.8"/>
  <rect x="10" y="250" width="100" height="15" fill="oklch(40% 0.06 60)" opacity="0.8"/>
  
  <!-- Right pillar -->
  <rect x="1800" y="200" width="120" height="880" fill="url(#woodGradient)" filter="url(#softShadow)"/>
  <rect x="1810" y="210" width="100" height="20" fill="oklch(40% 0.06 60)" opacity="0.8"/>
  <rect x="1810" y="250" width="100" height="15" fill="oklch(40% 0.06 60)" opacity="0.8"/>
  
  <!-- Top beam -->
  <rect x="0" y="180" width="1920" height="40" fill="url(#woodGradient)" filter="url(#softShadow)"/>
  <rect x="0" y="185" width="1920" height="8" fill="oklch(40% 0.06 60)" opacity="0.8"/>
  
  <!-- Garden ground with raked sand pattern -->
  <rect x="120" y="600" width="1680" height="480" fill="oklch(88% 0.012 85)"/>
  
  <!-- Raked sand lines -->
  <g stroke="oklch(82% 0.018 80)" stroke-width="1" opacity="0.4" fill="none">
    <path d="M150 650 Q400 645 650 650 Q900 655 1150 650 Q1400 645 1650 650 Q1750 652 1800 650"/>
    <path d="M150 680 Q400 675 650 680 Q900 685 1150 680 Q1400 675 1650 680 Q1750 682 1800 680"/>
    <path d="M150 710 Q400 705 650 710 Q900 715 1150 710 Q1400 705 1650 710 Q1750 712 1800 710"/>
    <path d="M150 740 Q400 735 650 740 Q900 745 1150 740 Q1400 735 1650 740 Q1750 742 1800 740"/>
    <path d="M150 770 Q400 765 650 770 Q900 775 1150 770 Q1400 765 1650 770 Q1750 772 1800 770"/>
    <path d="M150 800 Q400 795 650 800 Q900 805 1150 800 Q1400 795 1650 800 Q1750 802 1800 800"/>
    <path d="M150 830 Q400 825 650 830 Q900 835 1150 830 Q1400 825 1650 830 Q1750 832 1800 830"/>
    <path d="M150 860 Q400 855 650 860 Q900 865 1150 860 Q1400 855 1650 860 Q1750 862 1800 860"/>
    <path d="M150 890 Q400 885 650 890 Q900 895 1150 890 Q1400 885 1650 890 Q1750 892 1800 890"/>
  </g>
  
  <!-- Large zen stones -->
  <ellipse cx="400" cy="720" rx="45" ry="35" fill="url(#stoneGradient)" filter="url(#softShadow)"/>
  <ellipse cx="800" cy="750" rx="60" ry="40" fill="url(#stoneGradient)" filter="url(#softShadow)"/>
  <ellipse cx="1300" cy="700" rx="50" ry="38" fill="url(#stoneGradient)" filter="url(#softShadow)"/>
  
  <!-- Smaller accent stones -->
  <ellipse cx="350" cy="780" rx="25" ry="20" fill="oklch(70% 0.010 78)" filter="url(#softShadow)"/>
  <ellipse cx="900" cy="680" rx="30" ry="22" fill="oklch(70% 0.010 78)" filter="url(#softShadow)"/>
  <ellipse cx="1200" cy="780" rx="28" ry="21" fill="oklch(70% 0.010 78)" filter="url(#softShadow)"/>
  
  <!-- Moss patches near stones -->
  <ellipse cx="385" cy="745" rx="65" ry="45" fill="url(#mossGradient)" opacity="0.7"/>
  <ellipse cx="820" cy="775" rx="80" ry="50" fill="url(#mossGradient)" opacity="0.7"/>
  <ellipse cx="1285" cy="725" rx="70" ry="48" fill="url(#mossGradient)" opacity="0.7"/>
  
  <!-- Small moss details -->
  <circle cx="300" cy="650" r="15" fill="oklch(32% 0.085 130)" opacity="0.6"/>
  <circle cx="1100" cy="670" r="18" fill="oklch(32% 0.085 130)" opacity="0.6"/>
  <circle cx="1500" cy="780" r="12" fill="oklch(32% 0.085 130)" opacity="0.6"/>
  
  <!-- Subtle bamboo in the distance -->
  <g opacity="0.3" fill="oklch(45% 0.05 135)">
    <rect x="1650" y="300" width="8" height="300" rx="4"/>
    <rect x="1670" y="280" width="6" height="280" rx="3"/>
    <rect x="1685" y="320" width="7" height="260" rx="3"/>
  </g>
  
  <!-- Stepping stones path -->
  <ellipse cx="600" cy="850" rx="35" ry="25" fill="oklch(75% 0.008 82)" filter="url(#softShadow)"/>
  <ellipse cx="700" cy="820" rx="40" ry="28" fill="oklch(75% 0.008 82)" filter="url(#softShadow)"/>
  <ellipse cx="850" cy="880" rx="38" ry="26" fill="oklch(75% 0.008 82)" filter="url(#softShadow)"/>
  <ellipse cx="950" cy="840" rx="42" ry="30" fill="oklch(75% 0.008 82)" filter="url(#softShadow)"/>
  
  <!-- Atmospheric mist in the distance -->
  <ellipse cx="960" cy="500" rx="300" ry="80" fill="oklch(95% 0.005 100)" opacity="0.4"/>
  <ellipse cx="1400" cy="480" rx="250" ry="60" fill="oklch(95% 0.005 100)" opacity="0.3"/>
  
  <!-- Add subtle texture to the entire scene -->
  <rect width="1920" height="1080" fill="url(#skyGradient)" filter="url(#textureNoise)" opacity="0.5"/>
</svg>
