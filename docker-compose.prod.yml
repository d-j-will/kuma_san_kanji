# Production-like setup for local testing

services:
  db:
    image: postgres:15-alpine
    container_name: kuma_san_kanji_db_prod
    environment:
      POSTGRES_DB: kuma_san_kanji_prod
      POSTGRES_USER: kuma_san_kanji
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuma_san_kanji -d kuma_san_kanji_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuma_san_kanji_app_prod
    environment:
      MIX_ENV: prod
      DATABASE_URL: postgresql://kuma_san_kanji:postgres@db:5432/kuma_san_kanji_prod
      SECRET_KEY_BASE: 1vLrv+LQ2sQ4mBM6nEP8kBwuaVDx1N+vV6+bHybZLJDGEK1lRYdrsAF+tzAqLtst
      PHX_HOST: localhost
      PORT: 4000
      PHX_SERVER: true
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Setting up production environment...' &&
        ./bin/migrate_and_seed &&
        echo 'Starting production server...' &&
        ./bin/server
      "

volumes:
  postgres_prod_data:

networks:
  default:
    name: kuma_san_kanji_prod_network
