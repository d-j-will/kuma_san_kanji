services:
  app:
    image: ghcr.io/davewil/kuma-san-kanji:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:${POSTGRES_PASSWORD}@postgres/kuma_san_kanji_prod"
      PHX_HOST: "kanji.davewil.dev"
      PHX_SERVER: "true"
      PORT: "4000"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      TOKEN_SIGNING_SECRET: "${TOKEN_SIGNING_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: kuma_san_kanji_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
