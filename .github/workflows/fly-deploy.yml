# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Build, Test, and Deploy
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.18.x
          otp-version: 27.x

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install MeCab
        run: sudo apt-get update && sudo apt-get install -y mecab libmecab-dev mecab-ipadic-utf8

      - name: Install dependencies
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Compile project
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Setup assets
        run: mix assets.setup
        env:
          MIX_ENV: dev

      - name: Build assets
        run: mix assets.build
        env:
          MIX_ENV: dev

      - name: Setup test database
        run: |
          mix ecto.create
          mix ecto.migrate
        env:
          MIX_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost/kuma_san_kanji_test

      - name: Run tests
        run: mix test
        env:
          MIX_ENV: test

      - name: Setup database for ingestion
        run: |
          mix ecto.create
          mix ecto.migrate
          mix run priv/repo/seeds.exs
        env:
          MIX_ENV: dev
          DATABASE_URL: postgres://postgres:postgres@localhost/kuma_san_kanji_dev

      - name: Create KanjiVG directory
        run: mkdir -p priv/static/kanjivg

      - name: Run KanjiVG ingestion
        run: mix kanjivg.ingest --force
        env:
          MIX_ENV: dev
          DATABASE_URL: postgres://postgres:postgres@localhost/kuma_san_kanji_dev
          DISABLE_LIVE_RELOAD: 1

      - name: Upload KanjiVG assets
        uses: actions/upload-artifact@v4
        with:
          name: kanjivg-assets
          path: priv/static/kanjivg
          if-no-files-found: warn

  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    needs: test
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - name: Download KanjiVG assets
        uses: actions/download-artifact@v4
        with:
          name: kanjivg-assets
          path: priv/static/kanjivg
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
