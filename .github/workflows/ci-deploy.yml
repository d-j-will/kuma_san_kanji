name: CI / Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5432/kuma_san_kanji_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kuma_san_kanji_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir
        id: setup
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.x"
          otp-version: "28.x"

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-${{ env.MIX_ENV }}-otp${{ steps.setup.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ env.MIX_ENV }}-otp${{ steps.setup.outputs.otp-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Set up database
        run: mix ecto.create --quiet && mix ecto.migrate --quiet

      - name: Tests
        run: mix test

      - name: Hex audit
        run: mix hex.audit

      - name: Check unused deps
        run: mix deps.unlock --check-unused

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/davewil/kuma-san-kanji:latest
            ghcr.io/davewil/kuma-san-kanji:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy to Docker host
        env:
          DEPLOY_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DEPLOY_SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          DEPLOY_TOKEN_SIGNING_SECRET: ${{ secrets.TOKEN_SIGNING_SECRET }}
          DEPLOY_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          DEPLOY_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          # Copy deployment files to the server
          ssh root@${{ secrets.DEPLOY_HOST }} "mkdir -p /root/kuma_san_kanji"
          scp docker-compose.prod.yml root@${{ secrets.DEPLOY_HOST }}:/root/kuma_san_kanji/docker-compose.prod.yml

          # Write .env from GitHub secrets (always overwrite to stay in sync)
          printf 'POSTGRES_PASSWORD=%s\nSECRET_KEY_BASE=%s\nTOKEN_SIGNING_SECRET=%s\nADMIN_EMAIL=%s\nADMIN_PASSWORD=%s\n' \
            "$DEPLOY_POSTGRES_PASSWORD" "$DEPLOY_SECRET_KEY_BASE" "$DEPLOY_TOKEN_SIGNING_SECRET" \
            "$DEPLOY_ADMIN_EMAIL" "$DEPLOY_ADMIN_PASSWORD" > /tmp/.env.deploy
          scp /tmp/.env.deploy root@${{ secrets.DEPLOY_HOST }}:/root/kuma_san_kanji/.env
          rm -f /tmp/.env.deploy

          # Fix DNS if broken (Tailscale DNS issue on VM reboots)
          ssh root@${{ secrets.DEPLOY_HOST }} "
            tailscale set --accept-dns=false 2>/dev/null || true
            nslookup ghcr.io > /dev/null 2>&1 || { printf 'nameserver 8.8.8.8\nnameserver 8.8.4.4\n' > /etc/resolv.conf; echo 'DNS fixed'; }
          "

          # Authenticate GHCR if needed
          ssh root@${{ secrets.DEPLOY_HOST }} "docker pull ghcr.io/davewil/kuma-san-kanji:latest --quiet 2>/dev/null" || \
            echo "${{ secrets.GITHUB_TOKEN }}" | ssh root@${{ secrets.DEPLOY_HOST }} docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Ensure proxy network exists (caddy-docker-proxy uses it)
          ssh root@${{ secrets.DEPLOY_HOST }} "docker network create proxy 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=accept-new root@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /root/kuma_san_kanji

            # Pull new image
            echo "Pulling latest image..."
            docker compose -f docker-compose.prod.yml pull app 2>&1
            echo "Pull complete."

            # Ensure postgres is running and healthy
            echo "Starting postgres..."
            docker compose -f docker-compose.prod.yml up -d postgres 2>&1
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres < /dev/null >/dev/null 2>&1; then
                echo "Postgres ready."
                break
              fi
              sleep 1
            done

            # Migrate and setup admin in one call
            echo "Running migrations and admin setup..."
            docker compose -f docker-compose.prod.yml run --rm --no-TTY app bin/kuma_san_kanji eval "KumaSanKanji.Release.migrate_and_setup()" < /dev/null 2>&1
            echo "Migrations and admin setup complete."

            # Recreate app with new image
            echo "Starting app..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-build --remove-orphans 2>&1
            sleep 5

            echo "=== Status ==="
            docker compose -f docker-compose.prod.yml ps 2>&1
            echo "Deploy complete."
          EOF

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [quality, deploy]
    if: always() && (needs.quality.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy.result == 'success')

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Sanitize commit message for JSON (escape quotes, backslashes, newlines)
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/\\/\\\\/g; s/"/\\"/g' | cut -c1-100)

          if [ "${{ needs.quality.result }}" = "failure" ]; then
            TITLE="CI Failed: Quality"
            COLOR=15548997
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            TITLE="CI Failed: Deploy"
            COLOR=15548997
          else
            TITLE="Deployed: ${{ github.ref_name }}"
            COLOR=3066993
          fi

          curl -sf -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${TITLE}\",
                \"description\": \"**Repo:** ${{ github.repository }}\\n**Branch:** ${{ github.ref_name }}\\n**Commit:** \`${GITHUB_SHA::7}\` — ${SAFE_MSG}\\n**Run:** [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
                \"color\": ${COLOR}
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
